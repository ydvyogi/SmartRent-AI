<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartRent AI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.container {
    backdrop-filter: blur(15px);
    background: rgba(255, 255, 255, 0.1);
    padding: 30px;
    border-radius: 20px;
    width: 320px;
    color: white;
    text-align: center;
    box-shadow: 0 0 25px rgba(0,0,0,0.2);
}

h2 {
    margin-bottom: 20px;
}

input, select {
    width: 100%;
    padding: 10px;
    margin: 8px 0;
    border-radius: 10px;
    border: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, #00c6ff, #0072ff);
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    opacity: 0.9;
}

.result {
    margin-top: 15px;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">
    <h2>🏠 SmartRent AI</h2>

    <select id="city"></select>

    <input type="number" id="area" placeholder="Area (sq ft)">
    <input type="number" id="bedrooms" placeholder="Bedrooms">
    <input type="number" id="bathrooms" placeholder="Bathrooms">
    <input type="number" id="parking" placeholder="Parking (0/1)">

    <button onclick="predict()">Predict Rent</button>

    <div class="result" id="result"></div>
</div>

<script>
const API = "https://smartrent-ai-9ltz.onrender.com"; // YOUR BACKEND

// Load cities
async function loadCities() {
    try {
        const res = await fetch(`${API}/cities`);
        const data = await res.json();

        const citySelect = document.getElementById("city");
        citySelect.innerHTML = "";

        data.cities.forEach(city => {
            const option = document.createElement("option");
            option.value = city;
            option.textContent = city;
            citySelect.appendChild(option);
        });

    } catch (err) {
        document.getElementById("result").innerText = "❌ Backend not running";
    }
}

// Predict rent
async function predict() {
    const city = document.getElementById("city").value;
    const area = document.getElementById("area").value;
    const bedrooms = document.getElementById("bedrooms").value;
    const bathrooms = document.getElementById("bathrooms").value;
    const parking = document.getElementById("parking").value;

    try {
        const res = await fetch(`${API}/predict`, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                city: city,
                area: Number(area),
                bedrooms: Number(bedrooms),
                bathrooms: Number(bathrooms),
                parking: Number(parking)
            })
        });

        const data = await res.json();

        document.getElementById("result").innerText =
            "Estimated Rent: ₹ " + Math.round(data.predicted_rent);

    } catch (err) {
        document.getElementById("result").innerText = "❌ Error connecting to backend";
    }
}

// Load cities on start
loadCities();
</script>

</body>
</html>
