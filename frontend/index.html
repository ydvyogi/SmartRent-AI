<!DOCTYPE html>
<html>
<head>
    <title>SmartRent AI</title>

    <style>
        /* 🔥 Animated Gradient Background */
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(-45deg, #667eea, #764ba2, #6a11cb, #2575fc);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 💎 Glass Container */
        .container {
            backdrop-filter: blur(20px);
            background: rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            padding: 30px;
            width: 340px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        input, button {
            width: 100%;
            margin: 8px 0;
            padding: 10px;
            border-radius: 8px;
            border: none;
            outline: none;
        }

        input {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        input::placeholder {
            color: #eee;
        }

        button {
            background: #00c6ff;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #0072ff;
        }

        #result {
            margin-top: 15px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
        }

        label {
            font-size: 14px;
            opacity: 0.8;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🏠 SmartRent AI</h2>

    <!-- 🔥 Searchable City Input -->
    <label>City</label>
    <input id="city" placeholder="Type or select city..." list="cityList">
    <datalist id="cityList"></datalist>

    <label>Area</label>
    <input id="area" placeholder="Area (sq ft)">

    <label>Bedrooms</label>
    <input id="bedrooms" placeholder="Bedrooms">

    <label>Bathrooms</label>
    <input id="bathrooms" placeholder="Bathrooms">

    <label>Parking</label>
    <input id="parking" placeholder="Parking">

    <button onclick="predict()">Predict Rent</button>

    <div id="result">₹ --</div>
</div>

<script>

// =========================
// 🔥 LOAD CITIES DYNAMICALLY
// =========================
async function loadCities() {
    try {
        const res = await fetch("http://127.0.0.1:8000/cities");
        const data = await res.json();

        const list = document.getElementById("cityList");
        list.innerHTML = "";

        data.cities.forEach(city => {
            const option = document.createElement("option");
            option.value = city;
            list.appendChild(option);
        });

    } catch (error) {
        console.error("Error loading cities:", error);
    }
}

// =========================
// 🔥 PREDICT FUNCTION
// =========================
async function predict() {
    const city = document.getElementById("city").value;
    const area = document.getElementById("area").value;
    const bedrooms = document.getElementById("bedrooms").value;
    const bathrooms = document.getElementById("bathrooms").value;
    const parking = document.getElementById("parking").value;

    if (!city || !area || !bedrooms || !bathrooms || !parking) {
        document.getElementById("result").innerText = "⚠️ Fill all fields";
        return;
    }

    try {
        const res = await fetch("http://127.0.0.1:8000/predict", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                city: city,
                area: parseFloat(area),
                bedrooms: parseInt(bedrooms),
                bathrooms: parseInt(bathrooms),
                parking: parseInt(parking)
            })
        });

        const data = await res.json();

        if (data.predicted_rent) {
            document.getElementById("result").innerText =
                "₹ " + data.predicted_rent;
        } else {
            document.getElementById("result").innerText =
                "❌ " + data.error;
        }

    } catch (err) {
        document.getElementById("result").innerText =
            "❌ Backend not running";
    }
}

// Load cities on start
loadCities();

</script>

</body>
</html>
